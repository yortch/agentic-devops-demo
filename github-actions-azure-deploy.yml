name: Azure Deployment with azd CLI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Backend
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7

      - name: Upload Frontend Artifact  
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Backend Tests
        run: |
          cd backend
          mvn test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Run E2E Tests
        run: |
          cd tests
          npm install
          npx playwright install --with-deps
          npx playwright test --project chromium

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            backend/target/surefire-reports
            tests/test-results
          retention-days: 7

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install azd CLI
        uses: Azure/setup-azd@v1.0.0

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure with azd
        run: |
          azd auth login \
            --client-id "${{ env.AZURE_CLIENT_ID }}" \
            --client-secret "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant-id "${{ env.AZURE_TENANT_ID }}"

      - name: Setup Infrastructure Files
        run: |
          # Create infra directory and move Terraform files
          mkdir -p infra
          cp terraform-main.tf infra/main.tf
          cp terraform-variables.tf infra/variables.tf  
          cp terraform-outputs.tf infra/outputs.tf
          
          # Create .azd directory and config
          mkdir -p .azd
          echo '{"version": 1, "defaultEnvironment": "production"}' > .azd/config.json

      - name: Provision Infrastructure
        run: |
          azd provision --environment production --no-prompt
        env:
          AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
          AZURE_LOCATION: "eastus"

      - name: Upload Infrastructure State
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: |
            .azd
            infra/.terraform
            infra/terraform.tfstate*
          retention-days: 30

  deploy-applications:
    name: Deploy Applications
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment:
      name: production
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Infrastructure State
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: .

      - name: Install azd CLI
        uses: Azure/setup-azd@v1.0.0

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure with azd
        run: |
          azd auth login \
            --client-id "${{ env.AZURE_CLIENT_ID }}" \
            --client-secret "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant-id "${{ env.AZURE_TENANT_ID }}"

      - name: Setup Infrastructure Files
        run: |
          # Restore infrastructure files
          mkdir -p infra
          cp terraform-main.tf infra/main.tf
          cp terraform-variables.tf infra/variables.tf
          cp terraform-outputs.tf infra/outputs.tf

      - name: Deploy Applications
        run: |
          azd deploy --environment production --no-prompt
        env:
          AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Get Application URLs
        id: get-urls
        run: |
          BACKEND_URL=$(azd env get-values --environment production | grep BACKEND_URI | cut -d'=' -f2 | tr -d '"')
          FRONTEND_URL=$(azd env get-values --environment production | grep FRONTEND_URI | cut -d'=' -f2 | tr -d '"')
          echo "backend-url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "frontend-url=$FRONTEND_URL" >> $GITHUB_OUTPUT

      - name: Update Deployment Status
        run: |
          echo "🚀 Deployment completed successfully!"
          echo "Backend URL: ${{ steps.get-urls.outputs.backend-url }}"
          echo "Frontend URL: ${{ steps.get-urls.outputs.frontend-url }}"

  cleanup-on-failure:
    name: Cleanup on Failure
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, deploy-applications]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install azd CLI
        uses: Azure/setup-azd@v1.0.0

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Cleanup Failed Deployment
        run: |
          echo "Cleaning up failed deployment..."
          # Optionally run azd down to clean up resources
          # azd down --environment production --force --purge