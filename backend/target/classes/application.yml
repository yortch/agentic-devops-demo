spring:
  application:
    name: three-rivers-bank-credit-cards
  
  datasource:
    url: jdbc:h2:mem:creditcards
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    show-sql: false
    defer-datasource-initialization: true
  
  sql:
    init:
      mode: always

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

bian:
  api:
    url: https://virtserver.swaggerhub.com/B154/BIAN/CreditCard/13.0.0

resilience4j:
  circuitbreaker:
    instances:
      bianApi:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  retry:
    instances:
      bianApi:
        maxAttempts: 3
        waitDuration: 1s

logging:
  level:
    com.threeriversbank: INFO
    org.springframework: WARN
