spring:
  application:
    name: three-rivers-bank-backend
  
  datasource:
    url: jdbc:h2:mem:creditcards
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    hikari:
      connection-test-query: SELECT 1
      keepalive-time: 300000ms
      idle-timeout: 600000ms
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    show-sql: false
    defer-datasource-initialization: true
  
  sql:
    init:
      mode: always
  
  cache:
    type: simple
    cache-names:
      - transactions
      - billing

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# BIAN API Configuration
bian:
  api:
    base-url: https://virtserver.swaggerhub.com/B154/BIAN/CreditCard/13.0.0

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      bianApi:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      bianApi:
        max-attempts: 3
        wait-duration: 1000
  timelimiter:
    instances:
      bianApi:
        timeout-duration: 5s

# Logging
logging:
  level:
    com.threeriversbank: INFO
    org.springframework.web: INFO
    org.hibernate: INFO

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Warmup scheduler configuration
warmup:
  fixed-delay: 300000
  initial-delay: 60000
