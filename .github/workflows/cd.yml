name: CD - Deploy to Azure

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    types: [completed]
    branches: [main, iac]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'banking-demo'
        type: choice
        options:
        - banking-demo
        - staging
        - production

jobs:
  deploy-azure:
    name: Deploy to Azure with azd CLI
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install azd CLI
        uses: Azure/setup-azd@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure with azd (OIDC)
        run: |
          azd auth login \
            --client-id "${{ vars.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"

      - name: Provision and Deploy
        run: |
          azd up --environment ${{ inputs.environment || 'banking-demo' }} --no-prompt
        env:
          AZURE_ENV_NAME: ${{ inputs.environment || 'banking-demo' }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Get Application URLs
        id: get-urls
        run: |
          ENV_NAME="${{ inputs.environment || 'banking-demo' }}"
          BACKEND_URL=$(azd env get-values --environment "$ENV_NAME" | grep backend_uri | cut -d'=' -f2 | tr -d '"')
          FRONTEND_URL=$(azd env get-values --environment "$ENV_NAME" | grep frontend_uri | cut -d'=' -f2 | tr -d '"')
          echo "backend-url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "frontend-url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | $BACKEND_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | $FRONTEND_URL |" >> $GITHUB_STEP_SUMMARY
