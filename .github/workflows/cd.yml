name: CD - Deploy to Azure

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    types: [completed]
    branches: [main, iac]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - staging
        - production

jobs:
  deploy-azure:
    name: Deploy to Azure with azd CLI
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install azd CLI
        uses: Azure/setup-azd@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure with azd (OIDC)
        run: |
          azd auth login \
            --client-id "${{ vars.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"

      - name: Bootstrap Terraform State Backend
        id: tfstate
        run: |
          # Derive a globally unique storage account name from the subscription ID
          SUB_CLEAN=$(echo "${{ vars.AZURE_SUBSCRIPTION_ID }}" | tr -d '-' | cut -c1-12)
          TFSTATE_RG="rg-tfstate"
          TFSTATE_SA="sttf${SUB_CLEAN}"
          TFSTATE_CONTAINER="tfstate"
          LOCATION="${{ vars.AZURE_LOCATION }}"
          ENV_NAME="${{ inputs.environment || 'dev' }}"

          echo "Resource group:    $TFSTATE_RG"
          echo "Storage account:   $TFSTATE_SA"
          echo "Container:         $TFSTATE_CONTAINER"

          # Create resource group (idempotent)
          az group create \
            --name "$TFSTATE_RG" \
            --location "$LOCATION" \
            --output none

          # Create storage account (idempotent)
          az storage account create \
            --name "$TFSTATE_SA" \
            --resource-group "$TFSTATE_RG" \
            --location "$LOCATION" \
            --sku Standard_LRS \
            --allow-blob-public-access false \
            --output none

          # Create blob container (idempotent)
          az storage container create \
            --name "$TFSTATE_CONTAINER" \
            --account-name "$TFSTATE_SA" \
            --auth-mode login \
            --output none

          # Store values in azd environment for provider.conf.json substitution
          azd env new "$ENV_NAME" --no-prompt 2>/dev/null || true
          azd env set RS_STORAGE_ACCOUNT "$TFSTATE_SA" --environment "$ENV_NAME"
          azd env set RS_CONTAINER_NAME "$TFSTATE_CONTAINER" --environment "$ENV_NAME"
          azd env set RS_RESOURCE_GROUP "$TFSTATE_RG" --environment "$ENV_NAME"

          # Assign Storage Blob Data Contributor to the CI service principal
          SP_ID=$(az ad sp show --id "${{ vars.AZURE_CLIENT_ID }}" --query id -o tsv)
          STORAGE_ACCOUNT_ID=$(az storage account show \
            --name "$TFSTATE_SA" \
            --resource-group "$TFSTATE_RG" \
            --query id -o tsv)
          az role assignment create \
            --assignee "$SP_ID" \
            --role "Storage Blob Data Contributor" \
            --scope "$STORAGE_ACCOUNT_ID" \
            --output none 2>/dev/null || true

      - name: Provision and Deploy
        run: |
          azd up --environment ${{ inputs.environment || 'dev' }} --no-prompt
        env:
          AZURE_ENV_NAME: ${{ inputs.environment || 'dev' }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Get Application URLs
        id: get-urls
        run: |
          ENV_NAME="${{ inputs.environment || 'dev' }}"
          BACKEND_URL=$(azd env get-values --environment "$ENV_NAME" | grep backend_uri | cut -d'=' -f2 | tr -d '"')
          FRONTEND_URL=$(azd env get-values --environment "$ENV_NAME" | grep frontend_uri | cut -d'=' -f2 | tr -d '"')
          echo "backend-url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "frontend-url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | $BACKEND_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | $FRONTEND_URL |" >> $GITHUB_STEP_SUMMARY
