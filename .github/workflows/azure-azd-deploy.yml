name: Azure Deployment with azd CLI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker/**'
      - 'infra/**'
      - 'azure.yaml'
      - '.github/workflows/azure-azd-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - staging
        - production

env:
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Infrastructure Files
        run: |
          test -f infra/terraform/main.tf
          test -f infra/terraform/variables.tf
          test -f infra/terraform/outputs.tf

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.0

      - name: Terraform Format Check
        run: |
          cd infra/terraform
          terraform fmt -check

      - name: Terraform Validate
        run: |
          cd infra/terraform
          terraform init -backend=false
          terraform validate

  build-and-test:
    name: Build and Test Applications
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Backend
        run: |
          cd backend
          mvn clean compile

      - name: Run Backend Tests
        run: |
          cd backend
          mvn test

      - name: Build Backend Package
        run: |
          cd backend
          mvn package -DskipTests

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            backend/target/*.jar
            frontend/dist
          retention-days: 1

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install azd CLI
        uses: Azure/setup-azd@v1.0.0

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure with azd
        run: |
          azd auth login \
            --client-id "${{ env.AZURE_CLIENT_ID }}" \
            --client-secret "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant-id "${{ env.AZURE_TENANT_ID }}"

      - name: Setup Infrastructure Files
        run: |
          test -f infra/terraform/main.tf
          test -f infra/terraform/variables.tf
          test -f infra/terraform/outputs.tf
          
          mkdir -p .azd
          cp azd-config.json .azd/config.json

      - name: Set Environment Variables
        run: |
          azd env set AZURE_LOCATION eastus
          azd env set AZURE_SUBSCRIPTION_ID ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Infrastructure
        run: |
          azd provision --no-prompt
        env:
          AZURE_ENV_NAME: ${{ github.event.inputs.environment || 'dev' }}

      - name: Deploy Applications
        run: |
          azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: ${{ github.event.inputs.environment || 'dev' }}

      - name: Get Application URLs
        id: get-urls
        run: |
          BACKEND_URL=$(azd show --output json | jq -r '.services.backend.endpoint // "N/A"')
          FRONTEND_URL=$(azd show --output json | jq -r '.services.frontend.endpoint // "N/A"')
          
          echo "backend-url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "frontend-url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          
          echo "### 🚀 Deployment Success" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | $FRONTEND_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | $BACKEND_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Health | $BACKEND_URL/actuator/health |" >> $GITHUB_STEP_SUMMARY

      - name: Run Smoke Tests
        run: |
          BACKEND_URL="${{ steps.get-urls.outputs.backend-url }}"
          FRONTEND_URL="${{ steps.get-urls.outputs.frontend-url }}"
          
          # Test backend health endpoint
          if [ "$BACKEND_URL" != "N/A" ]; then
            echo "Testing backend health..."
            curl -f "$BACKEND_URL/actuator/health" || echo "Backend health check failed"
            
            echo "Testing backend API..."
            curl -f "$BACKEND_URL/api/cards" || echo "Backend API check failed"
          fi
          
          # Test frontend
          if [ "$FRONTEND_URL" != "N/A" ]; then
            echo "Testing frontend..."
            curl -f "$FRONTEND_URL" || echo "Frontend check failed"
          fi

  cleanup-on-failure:
    name: Cleanup Failed Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install azd CLI
        uses: Azure/setup-azd@v1.0.0

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure with azd
        run: |
          azd auth login \
            --client-id "${{ env.AZURE_CLIENT_ID }}" \
            --client-secret "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant-id "${{ env.AZURE_TENANT_ID }}"

      - name: Setup Infrastructure Files
        run: |
          test -f infra/terraform/main.tf
          test -f infra/terraform/variables.tf
          test -f infra/terraform/outputs.tf
          
          mkdir -p .azd
          cp azd-config.json .azd/config.json

      - name: Attempt Cleanup
        run: |
          echo "Deployment failed, attempting cleanup..."
          # Only clean up if this was a new deployment
          if [ "${{ github.event.inputs.environment }}" = "dev" ]; then
            echo "Cleaning up development environment..."
            azd down --force --purge || echo "Cleanup failed or resources were already removed"
          else
            echo "Skipping cleanup for ${{ github.event.inputs.environment }} environment"
          fi
        continue-on-error: true